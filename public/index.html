<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevChat version 1</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#1e293b);
}

.chat-container{
    width:900px;
    height:650px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    display:flex;
    flex-direction:column;
}

.header{
    background:#2563eb;
    color:white;
    padding:18px;
    font-size:24px;
    display:flex;
    justify-content:space-between;
}

.messages{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:#eef2ff;
}

.message{
    display:flex;
    margin:12px 0;
}

.me{
    justify-content:flex-end;
}

.other{
    justify-content:flex-start;
}

.bubble{
    max-width:60%;
    padding:12px 18px;
    border-radius:18px;
    word-wrap:break-word;
}

.me .bubble{
    background:#2563eb;
    color:white;
}

.other .bubble{
    background:#d1d5db;
    color:black;
}

.footer{
    display:flex;
    padding:15px;
    border-top:1px solid #ddd;
    background:white;
}

input{
    flex:1;
    padding:12px;
    border-radius:25px;
    border:1px solid #bbb;
    font-size:16px;
    outline:none;
}

button{
    margin-left:10px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#16a34a;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
<div>💬 DevChat</div>
<div>🟢 Online</div>
</div>

<div id="messages" class="messages"></div>

<div class="footer">

<input
id="message"
placeholder="Type a message...">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const messages = document.getElementById("messages");
const input = document.getElementById("message");

// Give each browser a random identity
const myId = Math.random().toString(36).substring(2,8);

function sendMessage(){

    if(input.value.trim()=="") return;

    socket.emit("chat",{
        id:myId,
        text:input.value
    });

    input.value="";
}

input.addEventListener("keypress",function(e){

    if(e.key==="Enter")
        sendMessage();

});

socket.on("chat",function(data){

    const row=document.createElement("div");

    row.classList.add("message");

    if(data.id===myId)
        row.classList.add("me");
    else
        row.classList.add("other");

    row.innerHTML=`
        <div class="bubble">
            ${data.text}
        </div>
    `;

    messages.appendChild(row);

    messages.scrollTop=messages.scrollHeight;

});

</script>

</body>
</html>
